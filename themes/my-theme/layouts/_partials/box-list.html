{{- $pages := .Pages }}

{{- if .IsHome }}
    {{- $pages = first 6 $pages }}
{{- end }}

<ul class="box-list">
    {{- range $pages }}
        <li>
            <a href="{{ .RelPermalink }}">
                <h2>{{ .LinkTitle }}</h2>
                <p>{{ .Summary }}</p>
            </a>
        </li>
    {{- end }}
</ul>
